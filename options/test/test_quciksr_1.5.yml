# network structures
network_g:
  type: QuickSRNetSmall
  upscale: 1.5

# path
path:
  pretrain_network_g: /home/huqiongyang/code/CATANet/experiments/channel_32_layer1/models/net_g_42000.pth
  strict_load_g: true
  results_root: results/CATANet

# validation settings
val:
  save_img: true
  suffix: super_quicksr  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr_pt
      crop_border: 2
      test_y_channel: true
    ssim:
      type: calculate_ssim_pt
      crop_border: 2
      test_y_channel: true