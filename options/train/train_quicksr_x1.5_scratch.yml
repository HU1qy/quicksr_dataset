# general settings for image SR training
name: train_quicksr_x1.5_scratch_20times
model_type: QuickSRNetModel
scale: 1.5
num_gpu: auto
manual_seed: 3407

# dataset and data loader settings
datasets:
  train:
    task: SR
    name: DIV2K
    type: PairedImageDataset
    dataroot_gt: /home/huqiongyang/code/CATANet/datasets/Div2K/DIV2K_train_HR/DIV2K_train_HR/DIV2K_train_HR
    dataroot_lq: /home/huqiongyang/code/CATANet/datasets/Div2K/DIV2K_train_HR/DIV2K_train_HR/DIV2K_LR_bicubic/x1.5
    filename_tmpl: '{}'
    io_backend:
      type: disk

    gt_size: 120
    use_hflip: true
    use_rot: true

    # data loader - 核心调整：batch_size改为320（32×10）
    use_shuffle: true
    num_worker_per_gpu: 24  # 线程数×10，匹配超大批次数据读取
    batch_size_per_gpu: 640  
    dataset_enlarge_ratio: 100
    prefetch_mode: 'cuda'
    pin_memory: true

  val_0:
    name: bsd100
    type: PairedImageDataset
    dataroot_gt: /home/huqiongyang/code/CATANet/datasets/bsd100/HR
    dataroot_lq: /home/huqiongyang/code/CATANet/datasets/bsd100/LR/x1.5
    filename_tmpl: '{}'
    io_backend:
      type: disk
 

# network structures
network_g:
  type: QuickSRNetSmall
  upscale: 1.5

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  optim_g:
    type: Adam
    lr: !!float 1e-2  # 线性缩放：5e-4 × 10 = 5e-3
    weight_decay: !!float 5e-6
    betas: [0.9, 0.999]
    eps: !!float 1e-8  # 保留浮点数类型声明

  scheduler:
    type: MultiStepLR
    # 里程碑缩放到1/10：原[200000,400000,600000,800000] /10 = [20000,40000,60000,80000]
    milestones: [10000, 20000, 30000, 40000]
    gamma: 0.5

  total_iter:  50000  # 总 # 总迭代数缩放到1/10：1e6 /10 = 1e5

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 125  # 验证频率缩放到1/10：2500 /10 = 250
  save_img: false

  metrics:
    psnr:
      type: calculate_psnr_pt
      crop_border: 2
      test_y_channel: true

    ssim:
      type: calculate_ssim_pt
      crop_border: 2
      test_y_channel: true

# logging settings
logger:
  print_freq: 10  # 打印频率缩放到1/10：200 /10 = 20
  save_checkpoint_freq: !!float 125  # 保存频率缩放到1/10：2500 /10 = 250
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500